version: '3.8'

services:

  postgres:
    image: postgis/postgis:15-3.3
    container_name: landprice_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: landprice
      POSTGRES_USER: landuser
      POSTGRES_PASSWORD: landpass123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    networks:
      - landnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U landuser -d landprice"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  geoserver:
    image: kartoza/geoserver:2.23.0
    container_name: landprice_geo
    restart: unless-stopped
    environment:
      GEOSERVER_ADMIN_USER: admin
      GEOSERVER_ADMIN_PASSWORD: geoserver
    ports:
      - "8080:8080"
    volumes:
      - geoserver_data:/opt/geoserver/data_dir
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - landnet
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: landprice_api
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - landnet
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    container_name: landprice_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
      - geoserver
    networks:
      - landnet

volumes:
  postgres_data:
  geoserver_data:

networks:
  landnet:
    driver: bridge
